<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Random Library Book</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, serif;
      background: #f5f0e8;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: normal;
      letter-spacing: 0.02em;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #666;
      margin-bottom: 24px;
      text-align: center;
    }

    select {
      font-family: Georgia, serif;
      font-size: 0.95rem;
      padding: 8px 12px;
      border: 1px solid #d4cfc6;
      background: #fff;
      color: #1a1a1a;
      margin-bottom: 20px;
      cursor: pointer;
      width: 100%;
      max-width: 320px;
    }

    select:focus { outline: 1px solid #1a1a1a; }

    button {
      background: #1a1a1a;
      color: #f5f0e8;
      border: none;
      padding: 12px 28px;
      font-family: Georgia, serif;
      font-size: 1rem;
      cursor: pointer;
      letter-spacing: 0.03em;
    }

    button:hover { background: #333; }
    button:disabled { background: #999; cursor: not-allowed; }

    #status {
      margin-top: 20px;
      font-size: 0.9rem;
      color: #666;
      min-height: 1.4em;
    }

    #card {
      display: none;
      margin-top: 36px;
      background: #fff;
      border: 1px solid #d4cfc6;
      max-width: 560px;
      width: 100%;
      padding: 28px 32px;
    }

    .card-library {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #aaa;
      margin-bottom: 10px;
    }

    .card-title {
      font-size: 1.3rem;
      line-height: 1.4;
      margin-bottom: 4px;
    }

    .card-author {
      font-size: 0.95rem;
      color: #555;
      margin-bottom: 20px;
    }

    .meta {
      font-size: 0.85rem;
      color: #444;
      border-top: 1px solid #e8e3da;
      padding-top: 16px;
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 4px 16px;
    }

    .meta-label { color: #888; }

    .description {
      font-size: 0.9rem;
      line-height: 1.6;
      color: #333;
      margin-top: 20px;
      border-top: 1px solid #e8e3da;
      padding-top: 16px;
    }

    .branches {
      margin-top: 20px;
      border-top: 1px solid #e8e3da;
      padding-top: 16px;
    }

    .branches-heading {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #888;
      margin-bottom: 10px;
    }

    .branch-row {
      display: flex;
      justify-content: space-between;
      font-size: 0.875rem;
      padding: 4px 0;
      border-bottom: 1px solid #f0ece4;
    }

    .branch-row:last-child { border-bottom: none; }

    .badge {
      font-size: 0.75rem;
      padding: 2px 8px;
      border-radius: 2px;
      font-family: monospace;
    }

    .badge-available   { background: #e6f4ea; color: #2d6a4f; }
    .badge-unavailable { background: #f4e6e6; color: #6a2d2d; }

    .record-link {
      display: block;
      margin-top: 20px;
      font-size: 0.8rem;
      color: #888;
      text-decoration: none;
      border-top: 1px solid #e8e3da;
      padding-top: 16px;
      word-break: break-all;
    }

    .record-link:hover { color: #1a1a1a; }
  </style>
</head>
<body>

  <h1>Random Library Book</h1>
  <p class="subtitle">Every item in the catalog has an equal shot.</p>

  <select id="library-select">
    <option value="bpl">Boston Public Library</option>
    <option value="sfpl">San Francisco Public Library</option>
    <option value="chipublib">Chicago Public Library</option>
    <option value="seattle">Seattle Public Library</option>
    <option value="tpl">Toronto Public Library</option>
  </select>

  <button id="btn" onclick="pickBook()">Pick a random book</button>
  <p id="status"></p>

  <div id="card">
    <p class="card-library" id="c-library"></p>
    <p class="card-title"   id="c-title"></p>
    <p class="card-author"  id="c-author"></p>
    <div class="meta"       id="c-meta"></div>
    <p class="description"  id="c-desc"></p>
    <div class="branches"   id="c-branches"></div>
    <a class="record-link"  id="c-link" target="_blank" rel="noopener"></a>
  </div>

  <script>
    const PROXY = "https://bpl-proxy.kabirsingh.workers.dev";

    const LIBRARIES = {
      bpl:       { name: "Boston Public Library",        bibPrefix: "S75C",  idMax: 9_560_000, recordBase: "https://bpl.bibliocommons.com/v2/record" },
      sfpl:      { name: "San Francisco Public Library", bibPrefix: "S93C",  idMax: 6_200_000, recordBase: "https://sfpl.bibliocommons.com/v2/record" },
      chipublib: { name: "Chicago Public Library",       bibPrefix: "S126C", idMax: 2_700_000, recordBase: "https://chipublib.bibliocommons.com/v2/record" },
      seattle:   { name: "Seattle Public Library",       bibPrefix: "S30C",  idMax: 1_500_000, recordBase: "https://seattle.bibliocommons.com/v2/record" },
      tpl:       { name: "Toronto Public Library",       bibPrefix: "S234C", idMax: 3_800_000, recordBase: "https://tpl.bibliocommons.com/v2/record" },
    };

    const ID_MIN = 100;

    function selectedLibrary() {
      const id = document.getElementById("library-select").value;
      return { id, ...LIBRARIES[id] };
    }

    function makeBibId(prefix, n) { return `${prefix}${n}`; }

    async function fetchAvailability(lib, bibId) {
      const r = await fetch(`${PROXY}/v2/libraries/${lib}/bibs/${bibId}/availability`);
      if (r.status === 404) return null;
      if (!r.ok) throw new Error(`Availability fetch failed: ${r.status}`);
      return r.json();
    }

    async function fetchMetadata(lib, bibId) {
      const r = await fetch(`${PROXY}/v2/libraries/${lib}/bibs?metadataIds=${bibId}&locale=en-US`);
      if (!r.ok) return null;
      const data = await r.json();
      const bib  = data?.entities?.bibs?.[bibId];
      return bib?.briefInfo ?? null;
    }

    async function pickRandomBook(library) {
      for (let i = 0; i < 30; i++) {
        const n     = Math.floor(Math.random() * (library.idMax - ID_MIN + 1)) + ID_MIN;
        const bibId = makeBibId(library.bibPrefix, n);
        const avail = await fetchAvailability(library.id, bibId);
        if (!avail) continue;
        const info = await fetchMetadata(library.id, bibId);
        if (!info) continue;
        return { bibId, info, avail, library };
      }
      throw new Error("Could not find a valid book after 30 attempts.");
    }

    function metaRow(label, value) {
      if (!value) return "";
      return `<span class="meta-label">${label}</span><span>${value}</span>`;
    }

    function renderCard({ bibId, info, avail, library }) {
      const title    = info.title || "Unknown title";
      const subtitle = info.subtitle ? `: ${info.subtitle}` : "";
      const authors  = (info.authors || []).join(", ") || "Unknown author";
      const desc     = info.description || "";

      const availEntity = avail?.entities?.availabilities?.[bibId] || {};
      const total       = availEntity.totalCopies ?? "?";
      const available   = availEntity.availableCopies ?? "?";

      document.getElementById("c-library").textContent = library.name;
      document.getElementById("c-title").textContent   = title + subtitle;
      document.getElementById("c-author").textContent  = `by ${authors}`;

      document.getElementById("c-meta").innerHTML = [
        metaRow("Format",  info.format),
        metaRow("Year",    info.publicationDate),
        metaRow("Edition", info.edition),
        metaRow("Call #",  info.callNumber),
        metaRow("Copies",  `${available} available / ${total} in system`),
      ].join("");

      const descEl = document.getElementById("c-desc");
      descEl.textContent    = desc;
      descEl.style.display  = desc ? "block" : "none";

      const items    = avail?.entities?.bibItems || {};
      const branches = {};
      for (const item of Object.values(items)) {
        const name   = item.branchName || item.branch?.name || "Unknown";
        const status = item.availability?.status || "UNKNOWN";
        if (!branches[name]) branches[name] = [];
        branches[name].push(status);
      }

      const onShelf     = Object.entries(branches).filter(([, ss]) => ss.includes("AVAILABLE")).sort(([a], [b]) => a.localeCompare(b));
      const allBranches = Object.entries(branches).sort(([a], [b]) => a.localeCompare(b));
      const branchesEl  = document.getElementById("c-branches");

      if (Object.keys(branches).length === 0) {
        branchesEl.style.display = "none";
      } else {
        branchesEl.style.display = "block";
        const heading = onShelf.length > 0
          ? "On the shelf right now"
          : "No copies on shelf — branches that own this title";

        const rows = (onShelf.length > 0 ? onShelf : allBranches).map(([name, ss]) => {
          const count    = ss.filter(s => s === "AVAILABLE").length || ss.length;
          const hasAvail = ss.includes("AVAILABLE");
          return `<div class="branch-row">
            <span>${name}</span>
            <span class="badge ${hasAvail ? "badge-available" : "badge-unavailable"}">${count} cop${count === 1 ? "y" : "ies"}</span>
          </div>`;
        }).join("");

        branchesEl.innerHTML = `<p class="branches-heading">${heading}</p>${rows}`;
      }

      const link = `${library.recordBase}/${bibId}`;
      const linkEl        = document.getElementById("c-link");
      linkEl.href         = link;
      linkEl.textContent  = link;

      document.getElementById("card").style.display = "block";
    }

    async function pickBook() {
      const btn     = document.getElementById("btn");
      const status  = document.getElementById("status");
      const library = selectedLibrary();
      btn.disabled  = true;
      document.getElementById("card").style.display = "none";
      status.textContent = `Searching the ${library.name} catalog…`;

      try {
        const result = await pickRandomBook(library);
        status.textContent = "";
        renderCard(result);
      } catch (e) {
        status.textContent = `Error: ${e.message}`;
      } finally {
        btn.disabled = false;
      }
    }
  </script>

</body>
</html>
